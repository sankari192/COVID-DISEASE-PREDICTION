<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>COVID Prediction - Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url("/static/covid-bg.jpg") no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }

    .form-container {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 30px;
      border-radius: 15px;
      max-width: 700px;
      margin: 5% auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeInSlide 1s ease;
    }

    .virus-icon {
      width: 80px;
      display: block;
      margin: 0 auto 20px;
      animation: rotateVirus 6s linear infinite;
    }

    @keyframes rotateVirus {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .typing-text {
      width: 0;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid #3498db;
      animation: typing 4s steps(30, end) forwards, blink 0.7s infinite;
      text-align: center;
      font-size: 28px;
      color: #2c3e50;
      font-weight: bold;
      margin-bottom: 30px;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes glow {
  from {
    box-shadow: 0 0 10px #3498db, 0 0 20px #3498db;
  }
  to {
    box-shadow: 0 0 20px #2980b9, 0 0 30px #2980b9;
  }
}


    @keyframes blink {
      0%, 100% { border-color: transparent; }
      50% { border-color: #3498db; }
    }

    label {
      font-weight: 500;
      display: block;
      color: #34495e;
      margin-bottom: 5px;
    }

    .form-control:focus {
      border-color: #3498db;
      box-shadow: none;
    }
button {
  position: relative;
  overflow: hidden;
}

.ripple {
  position: absolute;
  width: 120px;
  height: 120px;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  transform: scale(0);
  animation: ripple-effect 0.6s linear;
  pointer-events: none;
}

@keyframes ripple-effect {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="form-container">
    
    <img src="/static/virus.png" alt="virus icon" class="virus-icon">

    <div class="typing-text">COVID-19 Risk Prediction</div>

    <form method="POST" action="/result">
      <div class="row g-3">
        <div class="col-md-4">
          <label for="Age">Age</label>
          <input type="number" id="age" name="Age" class="form-control" placeholder="Enter age" min="0" max="120" required>
        </div>
        <div class="col-md-4">
          <label for="Gender">Gender</label>
          <select id="gender" name="Gender" class="form-control" required>
            <option value="" disabled selected>Select</option>
            <option value="0">Male</option>
            <option value="1">Female</option>
            <option value="2">Other</option>
          </select>
        </div>

        <div class="col-md-4">
              <label for="fever">Fever</label>
                <select id="fever" name="Fever" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="cough">Cough</label>
                <select id="cough" name="Cough" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="fatigue">Fatigue</label>
                <select id="fatigue" name="Fatigue" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="headache">Headache</label>
                <select id="headache" name="headache" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="sore_throat">Sore Throat</label>
                <select id="sore_throat" name="Sore_Throat" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="short_breath">Shortness of Breath</label>
                <select id="short_breath" name="Shortness_of_Breath" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="chest_pain">Chest Pain</label>
                <select id="chest_pain" name="Chest_Pain" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="taste">Loss of Taste</label>
                <select id="taste" name="Loss_of_Taste" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
                <label for="smell">Loss of Smell</label>
                  <select id="smell" name="Loss_of_Smell" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                  </select>
            </div>

            <div class="col-md-4">
              <label for="diarrhea">Diarrhea</label>
                <select id="diarrhea" name="Diarrhea" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="diabetes">Diabetes</label>
                <select id="diabetes" name="Diabetes" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="hypertension">Hypertension</label>
                <select id="hypertension" name="Hypertension" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-4">
              <label for="heart">Heart Disease</label>
                <select id="heart" name="Heart_Disease" class="form-control" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Yes</option>
                  <option value="0">No</option>
                </select>
            </div>
      
            <div class="col-md-4">
  <label for="Kidney_Disease">Kidney Disease</label>
  <select id="Kidney_Disease" name="Kidney_Disease" class="form-control" required>
    <option value="" disabled selected>Select</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
  </select>
</div>

<div class="col-md-4">
  <label for="Travel_History">Travel History</label>
  <select id="Travel_History" name="Travel_History" class="form-control" required>
    <option value="" disabled selected>Select</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
  </select>
</div>

<div class="col-md-4">
  <label for="Contact_With_COVID_Patient">Contact With COVID Patient</label>
  <select id="Contact_With_COVID_Patient" name="Contact_With_COVID_Patient" class="form-control" required>
    <option value="" disabled selected>Select</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
  </select>
</div>

<div class="col-md-4">
  <label for="Vaccinated">Vaccinated</label>
  <select id="Vaccinated" name="Vaccinated" class="form-control" required>
    <option value="" disabled selected>Select</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
  </select>
</div>


            

            <div class="col-md-4">
              <label for="Oxygen_Level">Oxygen Level</label>
              <input type="number" id="Oxygen_Level" name="Oxygen_Level" class="form-control" placeholder="e.g. 95" min="50" max="110" required>
            </div>


      <button type="submit">Predict</button>
    </form>
    <a href="/logout" class="btn btn-link mt-3 d-block text-center">Logout</a>
  </div>
  <script>
  const button = document.querySelector('button');

  button.addEventListener('click', function (e) {
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    this.appendChild(ripple);

    const rect = this.getBoundingClientRect();
    ripple.style.left = `${e.clientX - rect.left}px`;
    ripple.style.top = `${e.clientY - rect.top}px`;

    setTimeout(() => ripple.remove(), 600); // remove ripple after animation
  });
</script>

</body>
</html>
